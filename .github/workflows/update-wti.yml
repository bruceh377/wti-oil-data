name: 自动更新 WTI 原油数据

on:
  schedule:
    - cron: '*/5 * * * *'      # 每 5 分钟运行一次（可改成 */10 每10分钟）
  workflow_dispatch:           # 允许你手动点击运行

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: 安装依赖
        run: pip install yfinance pandas
      
      - name: 运行脚本
        run: python wti_crude_yfinance.py
      
      - name: 提交更新后的 JSON
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add wti_data.json
          git commit -m "自动更新 WTI 数据 $(date)" || echo "No changes"
          git push
