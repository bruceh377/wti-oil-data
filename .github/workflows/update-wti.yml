name: 自动更新 WTI 原油数据

on:
  schedule:
    - cron: '*/10 * * * *'      # 每 10 分钟一次（测试期间建议用这个，稳定后可改回 */5）
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: pip install yfinance pandas

      - name: 运行拉取脚本
        run: python wti_crude_yfinance.py

      - name: 提交并推送更新
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add wti_data.json
          git commit -m "自动更新 WTI 数据 $(date '+%Y-%m-%d %H:%M:%S')" || echo "No changes to commit"
          git pull --rebase origin main     # ← 关键修复：先拉取再 rebase
          git push
