name: 自动更新 WTI 原油数据

on:
  schedule:
    - cron: '*/10 * * * *'      # 测试期间用每10分钟，稳定后再改成 */5
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0                    # 拉取完整历史，减少冲突

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: pip install yfinance pandas

      - name: 运行拉取脚本
        run: python wti_crude_yfinance.py

      - name: 提交并推送更新（关键修复）
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          git add wti_data.json
          
          # 如果没有变化就跳过
          git commit -m "自动更新 WTI 数据 $(date '+%Y-%m-%d %H:%M:%S')" || echo "No changes to commit"
          
          # 先尝试正常拉取
          git pull --rebase origin main || echo "Pull failed, trying force"
          
          # 使用 force-with-lease（安全强制推送，只在没有别人改动时生效）
          git push --force-with-lease origin main
